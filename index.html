<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>China's Birthday</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&display=swap');
        
        body {
            background: linear-gradient(to bottom, #87CEEB, #4682B4);
            font-family: 'Libre Baskerville', serif;
            text-align: center;
            color: #fff;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            padding: 50px 20px;
        }
        .title {
            font-size: 4em;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 2px 2px 5px #2c3e50;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 1.5em;
            color: #FFE4B5;
        }
        .date-time {
            font-size: 1.5em;
            margin: 20px 0;
            color: #FFFACD;
        }
        .tagline {
            font-size: 2.5em;
            font-style: italic;
            color: #FFFAF0;
            margin-bottom: 30px;
        }
        .buttons a {
            display: inline-block;
            margin: 10px;
            padding: 15px 30px;
            font-size: 1.2em;
            background-color: #4169E1; /* El mismo azul de los mapas */
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: background-color 0.3s;
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.2);
        }
        .buttons a:hover {
            background-color: #191970;
        }
        audio {
            display: none;
        }
        .calendar-button {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background-color: #4169E1; /* El mismo azul de los mapas */
            color: white;
            font-size: 1.2em;
            border-radius: 50px;
            text-decoration: none;
        }
        .calendar-button:hover {
            background-color: #191970;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">China's Birthday</div>
        <div class="subtitle">Saturday, March 29th — 11:00 PM</div>
        <div class="tagline">Here we go again...</div>
        <div class="buttons">
            <a href="https://maps.apple.com/?q=Per%C3%BA%20979,%20B1641%20Acassuso,%20Provincia%20de%20Buenos%20Aires" target="_blank">Apple Maps</a>
            <a href="https://maps.google.com/?q=Per%C3%BA%20979,%20B1641%20Acassuso,%20Provincia%20de%20Buenos%20Aires" target="_blank">Google Maps</a>
        </div>
        
        <!-- Usamos la URL directa de GitHub para el archivo MP3 -->
        <audio id="birthday-audio" autoplay loop>
            <source src="ABBA.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
        
        <!-- Botón único para añadir al calendario -->
        <div class="calendar-buttons">
            <a class="calendar-button" href="#" onclick="addToCalendar()">Add to Calendar</a>
        </div>
    </div>

    <script>
        function addToCalendar() {
            const eventName = "China's Birthday";
            const eventDate = "20240329T230000Z"; // Fecha en formato UTC
            const eventEnd = "20240330T010000Z"; // Fecha de fin en formato UTC
            const eventLocation = "Perú 979, B1641 Acassuso, Provincia de Buenos Aires";
            const eventDescription = "Join us for the birthday celebration!";
            
            // Google Calendar link (Android)
            const googleCalendarURL = `https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(eventName)}&dates=${eventDate}/${eventEnd}&details=${encodeURIComponent(eventDescription)}&location=${encodeURIComponent(eventLocation)}&sf=true&output=xml`;

            // Apple Calendar link (iPhone)
            const appleCalendarURL = `webcal://p01-calendars.icloud.com/published/2/XXXXXXXXXXXXXXX/XXXXXXX.ics`; // Aquí debes poner el enlace a tu archivo .ics

            // Detectamos el sistema operativo y redirigimos al calendario correspondiente
            if (navigator.userAgent.match(/iPhone|iPad|iPod/i)) {
                window.location.href = appleCalendarURL; // iOS
            } else {
                window.location.href = googleCalendarURL; // Android
            }
        }
    </script>
</body>
</html>

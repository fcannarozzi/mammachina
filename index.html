<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lu Vidal's Birthday</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&display=swap');
        
        body {
            background: linear-gradient(to bottom, #87CEEB, #4682B4);
            font-family: 'Libre Baskerville', serif;
            text-align: center;
            color: #fff;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            padding: 50px 20px;
        }
        .title {
            font-size: 4em;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 2px 2px 5px #2c3e50;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 2em;
            color: #FFE4B5;
        }
        .date-time {
            font-size: 1.5em;
            margin: 20px 0;
            color: #FFFACD;
        }
        .tagline {
            font-size: 2.5em;
            font-style: italic;
            color: #FFFAF0;
            margin-bottom: 30px;
        }
        .buttons a {
            display: inline-block;
            margin: 10px;
            padding: 15px 30px;
            font-size: 1.2em;
            background-color: #4169E1;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            transition: background-color 0.3s;
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.2);
        }
        .buttons a:hover {
            background-color: #191970;
        }
        audio {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Lu Vidal's Birthday</div>
        <div class="subtitle">Friday, March 28th — 11:00 PM</div>
        <div class="tagline">Here we go again...</div>
        <div class="buttons">
            <a href="https://maps.apple.com/?q=Per%C3%BA%20979,%20B1641%20Acassuso,%20Provincia%20de%20Buenos%20Aires" target="_blank">Apple Maps</a>
            <a href="https://maps.google.com/?q=Per%C3%BA%20979,%20B1641%20Acassuso,%20Provincia%20de%20Buenos%20Aires" target="_blank">Google Maps</a>
        </div>
        <audio id="birthday-audio" loop>
            <source src="./ABBA.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('birthday-audio');
            document.body.addEventListener('click', () => {
                audio.play();
            }, { once: true });
        });
    </script>
</body>
</html>
